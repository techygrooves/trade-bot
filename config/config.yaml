# Non-secret bot configuration. Secrets live in .env.

# Markets to trade (high-liquidity USDT pairs to start).
symbols:
  - BTCUSDT
  - ETHUSDT

# Candle intervals.
timeframes:
  signal: "1h"   # primary entry/exit signal
  trend: "4h"    # higher-timeframe trend filter

# How many historical candles to pull per symbol/timeframe.
history_candles: 500

# Strategy parameters (used from Phase 1 onward).
strategy:
  ema_fast: 20
  ema_slow: 50
  ema_trend: 200
  rsi_period: 14
  rsi_lower: 40
  rsi_upper: 60
  adx_period: 14
  adx_min: 20
  atr_period: 14
  atr_stop_mult: 2.0
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  vol_ma_period: 20    # entry candle volume must exceed this rolling average

# Risk management.
risk:
  risk_per_trade_pct: 1.0     # % of equity risked per trade (risk_pct mode)
  max_open_positions: 3
  daily_loss_limit_pct: 5.0   # halt trading if daily realized loss exceeds this
  taker_fee_pct: 0.1
  slippage_bps: 2.0           # market-fill slippage assumed in backtests

# Exit scheme (backtester now; live engine adopts the validated winner in Phase C).
exits:
  scheme: "fixed_tp"          # "trend" | "fixed_tp" | "scaled"
  reward_mult: 1.5            # fixed_tp: take-profit at this multiple of the stop distance
  tp1_r: 1.5                  # scaled: sell tp1_frac at 1.5R
  tp1_frac: 0.333
  tp2_r: 3.0                  # scaled: sell tp2_frac at 3R
  tp2_frac: 0.333
  trail_atr_mult: 2.0         # scaled: ATR trailing-stop width for the remainder

# Live trading.
live:
  sizing_mode: "fixed_budget" # "fixed_budget" for tiny capital, else "risk_pct"
  trade_budget_usdt: 10.0     # USDT spent per trade in fixed_budget mode
  quote_asset: "USDT"
  reward_mult: 1.5            # take-profit distance as a multiple of the stop distance

# Exchange: "com" -> api.binance.com (Binance global), "us" -> api.binance.us.
exchange_tld: "com"

# Operational.
poll_seconds: 60
log_level: "INFO"
