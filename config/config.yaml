# Non-secret bot configuration. Secrets live in .env.

# Markets to trade (high-liquidity USDT pairs to start).
symbols:
  - BTCUSDT
  - ETHUSDT

# Candle intervals.
timeframes:
  signal: "1h"   # primary entry/exit signal
  trend: "4h"    # higher-timeframe trend filter

# How many historical candles to pull per symbol/timeframe.
history_candles: 500

# Strategy parameters (used from Phase 1 onward).
strategy:
  ema_fast: 20
  ema_slow: 50
  ema_trend: 200
  rsi_period: 14
  rsi_lower: 40
  rsi_upper: 60
  adx_period: 14
  adx_min: 20
  atr_period: 14
  atr_stop_mult: 2.0
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  vol_ma_period: 20    # entry candle volume must exceed this rolling average

# Risk management.
risk:
  risk_per_trade_pct: 1.0     # % of equity risked per trade (risk_pct mode)
  max_open_positions: 3
  daily_loss_limit_pct: 5.0   # halt trading if daily realized loss exceeds this
  taker_fee_pct: 0.1

# Live trading.
live:
  sizing_mode: "fixed_budget" # "fixed_budget" for tiny capital, else "risk_pct"
  trade_budget_usdt: 10.0     # USDT spent per trade in fixed_budget mode
  quote_asset: "USDT"
  reward_mult: 1.5            # legacy single-target fallback (see `exits` below)

# Trade management / exit policy (shared by the backtester AND the live trader,
# so simulated and live exits behave identically). "Let winners run":
#   * scale out at each take-profit rung (size_pct = fraction of the ORIGINAL
#     position closed at +reward_mult x the initial risk),
#   * move the stop to breakeven after the first rung,
#   * trail the remaining runner by atr_trail_mult ATRs after the last rung.
# Fractions should sum to <= 1.0; the leftover is the runner.
exits:
  take_profits:
    - reward_mult: 1.5
      size_pct: 0.34
    - reward_mult: 3.0
      size_pct: 0.33
  breakeven_after_first_tp: true
  trailing_enabled: true
  atr_trail_mult: 2.0

# Exchange: "com" -> api.binance.com (Binance global), "us" -> api.binance.us.
exchange_tld: "com"

# Operational.
poll_seconds: 60
log_level: "INFO"
